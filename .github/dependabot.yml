# TR: Dependabot yapılandırması — GitHub Actions sürüm güncellemelerini izler.
# EN: Dependabot configuration — monitors GitHub Actions version updates.
version: 2
updates:
  # TR: GitHub Actions sürüm güncellemelerini haftalık kontrol eder.
  # EN: Checks GitHub Actions version updates weekly.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "ci"
      - "dependencies"
    commit-message:
      prefix: "ci"

  # TR: tests/pytest altındaki Python bağımlılıklarını haftalık kontrol eder.
  # EN: Checks Python dependencies under tests/pytest weekly.
  - package-ecosystem: "pip"
    directory: "/tests/pytest"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
    commit-message:
      prefix: "test"

  # TR: tests/playwright altındaki Python bağımlılıklarını haftalık kontrol eder.
  # EN: Checks Python dependencies under tests/playwright weekly.
  - package-ecosystem: "pip"
    directory: "/tests/playwright"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
    commit-message:
      prefix: "test"

  # TR: tests/selenium altındaki Python bağımlılıklarını haftalık kontrol eder.
  # EN: Checks Python dependencies under tests/selenium weekly.
  - package-ecosystem: "pip"
    directory: "/tests/selenium"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
    commit-message:
      prefix: "test"
