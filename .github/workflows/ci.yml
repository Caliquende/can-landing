name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: "."

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: pip
        cache-dependency-path: |
          tests/pytest/requirements.txt
          tests/playwright/requirements.txt
          tests/selenium/requirements.txt

    - name: Run a one-line script
      run: echo "CI layer successfully initialized for Personal Landing Page"

    - name: Validate HTML
      run: |
        # Simple check if index.html exists and is readable
        if [ -f index.html ]; then
          echo "index.html found"
        else
          echo "index.html missing"
          exit 1
        fi

    - name: Install dependencies
      run: |
        python -m pip install -r tests/pytest/requirements.txt
        python -m pip install -r tests/playwright/requirements.txt
        python -m pip install -r tests/selenium/requirements.txt

    - name: Install Playwright Chromium
      run: python -m playwright install --with-deps chromium

    - name: Run pytest landing smoke tests
      run: python -m pytest tests/pytest -c tests/pytest/pytest.ini -m smoke

    - name: Run Playwright landing smoke tests
      run: python tests/playwright/run_tests.py --suite smoke

    - name: Run Selenium landing smoke tests
      run: python tests/selenium/run_tests.py --suite smoke

  # ──────────────────────────────────────────────────────────────
  # TR: Güvenlik Taraması — statik dosyalarda gizli bilgi ve güvensiz yapılandırma kontrolü
  # EN: Security Scan — checks static files for secrets and insecure configurations
  # ──────────────────────────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    # TR: HTML/JS dosyalarında hardcoded API anahtarı veya token olmadığını kontrol eder.
    # EN: Checks HTML/JS files for hardcoded API keys or tokens.
    - name: Check for hardcoded secrets
      run: |
        echo "🔒 Scanning for hardcoded secrets in static files..."
        FOUND=0
        # TR: Yaygın gizli bilgi kalıplarını arar.
        # EN: Searches for common secret patterns.
        for pattern in "sk-" "api_key" "apiKey" "secret_key" "secretKey" "access_token" "password" "BEGIN RSA PRIVATE KEY" "BEGIN OPENSSH PRIVATE KEY"; do
          if grep -rlI "$pattern" --include="*.html" --include="*.js" --include="*.css" . 2>/dev/null; then
            echo "⚠️  Potential secret pattern found: $pattern"
            FOUND=1
          fi
        done
        if [ "$FOUND" -eq 0 ]; then
          echo "✅ No hardcoded secrets detected."
        else
          echo "❌ Hardcoded secret patterns found."
          exit 1
        fi

    # TR: JavaScript dosyalarında güvensiz fonksiyon kullanımını (eval, innerHTML) kontrol eder.
    # EN: Checks JavaScript files for unsafe function usage (eval, innerHTML).
    - name: Check for unsafe JS patterns
      run: |
        echo "🔍 Scanning for unsafe JavaScript patterns..."
        FOUND=0
        for pattern in "eval(" "document.write(" "innerHTML.*="; do
          if grep -rnI "$pattern" --include="*.js" . 2>/dev/null; then
            echo "⚠️  Unsafe JS pattern found: $pattern"
            FOUND=1
          fi
        done
        if [ "$FOUND" -eq 0 ]; then
          echo "✅ No unsafe JavaScript patterns detected."
        else
          echo "❌ Unsafe JavaScript patterns found."
          exit 1
        fi
